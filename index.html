<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Surprise</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
      @keyframes floatUp {
        0% {
          transform: translateY(100vh) rotate(0deg);
        }
        100% {
          transform: translateY(-10vh) rotate(360deg);
        }
      }

      @keyframes popIn {
        0% {
          transform: scale(0.7);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      body {
        background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      }

      .floating {
        position: absolute;
        opacity: 0.2;
        animation: floatUp linear infinite;
      }

      .card-animate {
        animation: popIn 0.6s ease forwards;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center overflow-hidden text-center"
  >
    <!-- 🔷 BRAND HEADER -->
    <div
      class="absolute top-4 left-4 z-20 flex items-center gap-3 bg-white/10 backdrop-blur-md px-4 py-2 rounded-xl border border-white/20 shadow-lg"
    >
      <div
        class="w-10 h-10 flex items-center justify-center rounded-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold text-lg"
      >
        SK
      </div>

      <div class="text-white leading-tight text-left">
        <div class="text-sm md:text-base font-semibold">Bday Wishes</div>
        <div class="text-xs opacity-80">from Surya Kiran</div>
      </div>
    </div>

    <!-- 🌈 FLOATING BACKGROUND -->
    <div id="bg"></div>

    <!-- 🎁 GIFT VIEW -->
    <div
      id="gift-view"
      onclick="openGift()"
      class="cursor-pointer space-y-6 z-10"
    >
      <div
        class="p-10 rounded-full bg-white/10 backdrop-blur-lg hover:scale-105 transition text-6xl"
      >
        🎁
      </div>
      <h1 class="text-white text-3xl md:text-5xl font-bold">Tap to open</h1>
    </div>

    <!-- 🎉 CARD VIEW -->
    <div
      id="card-view"
      class="hidden card-animate bg-white/90 backdrop-blur-xl p-6 md:p-10 rounded-3xl shadow-xl max-w-xl w-full space-y-6 z-10"
    >
      <h2
        class="text-4xl md:text-6xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 text-transparent bg-clip-text"
      >
        Happy Birthday 🎉
      </h2>

      <p class="text-gray-600 text-lg">
       Cheers to you! May your birthday be the start of a year filled with good health, great luck, and even better memories. Wishing you happiness, success, and lots of joy 💖
      </p>

      <img
        src="https://images.unsplash.com/photo-1606983340126-99ab4feaa64a"
        class="rounded-xl w-full h-52 object-cover"
      />
    </div>

    <script>
      // 🌈 Floating icons
      const bg = document.getElementById("bg");
      const icons = ["✨", "🎉", "🎂", "💖"];

      for (let i = 0; i < 20; i++) {
        const el = document.createElement("div");
        el.innerText = icons[Math.floor(Math.random() * icons.length)];
        el.className = "floating text-2xl";
        el.style.left = Math.random() * 100 + "%";
        el.style.animationDuration = 5 + Math.random() * 10 + "s";
        bg.appendChild(el);
      }

      // 🎁 Open Gift
      function openGift() {
        document.getElementById("gift-view").style.display = "none";
        document.getElementById("card-view").classList.remove("hidden");

        startConfetti();
      }

      // 🎊 Continuous Confetti
      function startConfetti() {
        const duration = 3000; // 3 seconds
        const end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
          });

          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }
    </script>
  </body>
</html>
